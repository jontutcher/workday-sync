name: Publish

on:
  release:
    types: [published]

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Set version from release tag
        # Strips the leading 'v' from tags like v1.2.3
        run: uv version "${GITHUB_REF_NAME#v}"

      - name: Build package
        run: uv build

      - name: Publish to GitHub Packages
        run: uv publish --publish-url https://pypi.pkg.github.com/${{ github.repository_owner }}
        env:
          UV_PUBLISH_USERNAME: ${{ github.actor }}
          UV_PUBLISH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
